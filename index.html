<html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>구매자용 테스트 - 방콕가나안카페 오늘의 과일 주문</title><style>
:root{--ink:#20231f;--muted:#687065;--line:#dfe4da;--panel:#fff;--green:#2f7d46;--green-dark:#235d34;--soft:#f8faf5;--danger:#a93428;--yellow:#f2c94c;--shadow:0 18px 45px rgba(32,35,31,.09);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR",Arial,sans-serif}*{box-sizing:border-box}body{margin:0;background:linear-gradient(180deg,#f8f9f4,#eef4e9);color:var(--ink);min-height:100vh}button,input,textarea,select{font:inherit}button{border:0;cursor:pointer}.app{width:min(1080px,100%);margin:0 auto;padding:18px 14px 36px}.topbar{display:flex;align-items:center;justify-content:space-between;gap:14px;margin-bottom:18px}.brand{display:flex;align-items:center;gap:12px;min-width:0}.brand-mark{width:58px;height:58px;border-radius:8px;object-fit:cover;background:#31542b;box-shadow:0 8px 18px rgba(32,35,31,.16);flex:0 0 auto}h1{margin:0;font-size:clamp(1.35rem,3.8vw,2.05rem);line-height:1.16;letter-spacing:0}.subtitle{margin:4px 0 0;color:var(--muted);font-size:.95rem}.link-button,.secondary,.danger{display:inline-flex;align-items:center;justify-content:center;min-height:42px;border-radius:8px;padding:0 13px;font-weight:800;text-decoration:none}.link-button,.secondary{background:#edf3e8;color:var(--green-dark)}.danger{background:#fae8e5;color:var(--danger)}.notice{display:none;margin:0 0 14px;padding:13px 15px;border-radius:8px;background:#e8f3df;border:1px solid #cfe4bd;color:#2f5f26;font-weight:700}.notice.show{display:block}.status{margin:0 0 14px;padding:12px 14px;border-radius:8px;background:#fff8df;border:1px solid #ead27a;color:#67510e;font-weight:800}.status.closed{background:#fae8e5;border-color:#efc3bd;color:#8b2c22}.layout{display:grid;grid-template-columns:minmax(0,1fr)360px;gap:16px;align-items:start}.products{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}.product{min-height:156px;border:1px solid var(--line);border-radius:8px;background:var(--panel);box-shadow:var(--shadow);padding:14px;display:grid;grid-template-columns:82px minmax(0,1fr);gap:13px;align-items:center}.fruit-art,.product-photo{width:82px;aspect-ratio:1;border-radius:18px;position:relative;overflow:hidden;background:var(--art-bg)}.photo-button{width:82px;aspect-ratio:1;border-radius:18px;overflow:hidden;padding:0;background:#fff;border:1px solid var(--line)}.product-photo{object-fit:cover;display:block}.product-desc{display:none;margin:8px 0 10px;color:var(--muted);line-height:1.45;font-size:.9rem}.product-desc.show{display:block}.photo-error{display:none;width:82px;aspect-ratio:1;border-radius:18px;border:1px solid var(--line);background:#fae8e5;color:var(--danger);font-size:.78rem;font-weight:800;align-items:center;justify-content:center;text-align:center;padding:8px}.photo-error.show{display:flex}.fruit-art:before{content:"";position:absolute;inset:16% 18% 18% 16%;border-radius:48% 52% 46% 54%;background:var(--art-main);box-shadow:inset -11px -13px 0 rgba(0,0,0,.08);transform:rotate(var(--art-rotate))}.fruit-art:after{content:"";position:absolute;width:24%;height:13%;top:19%;left:47%;border-radius:999px 10px 999px 10px;background:#3f8b45;transform:rotate(-24deg)}.product h2{margin:0 0 5px;font-size:1.07rem;letter-spacing:0}.product p{margin:0 0 10px;color:var(--muted);font-size:.93rem}.option-select{margin:0 0 10px} .stepper{display:grid;grid-template-columns:42px 48px 42px;align-items:center;border:1px solid var(--line);border-radius:999px;background:var(--soft);overflow:hidden;width:max-content}.stepper button{height:40px;background:transparent;font-size:1.25rem;font-weight:800;color:var(--green-dark)}.stepper output{text-align:center;font-weight:800;font-size:1.05rem}.panel{border:1px solid var(--line);border-radius:8px;background:var(--panel);box-shadow:var(--shadow);padding:16px}.side{position:sticky;top:14px}.panel h2{margin:0 0 12px;font-size:1.1rem;letter-spacing:0}label{display:block;margin:14px 0 7px;color:var(--muted);font-weight:700;font-size:.92rem}input,textarea,select{width:100%;border:1px solid var(--line);border-radius:8px;background:#fbfcf8;color:var(--ink);padding:12px;outline:none}input:focus,textarea:focus,select:focus{border-color:var(--green);box-shadow:0 0 0 3px rgba(47,125,70,.13)}textarea{min-height:78px;resize:vertical}.field-row{display:grid;grid-template-columns:1fr 116px;gap:8px;align-items:end}.pin-row{display:grid;grid-template-columns:1fr 132px;gap:8px;align-items:end}.help{margin:7px 0 0;color:var(--muted);font-size:.84rem;line-height:1.45}.summary{display:grid;gap:8px;margin:6px 0 16px;padding:0;background:transparent;border:0;border-radius:0;min-height:0}.summary-row,.total-row,.total-card{display:flex;justify-content:space-between;gap:10px;align-items:baseline}.summary-row{padding:8px 0;border-bottom:1px solid var(--line)}.line-note{display:block;color:var(--muted);font-size:.82rem;font-weight:600;margin-top:2px}.summary .total-row{padding-top:8px;border-top:0;font-weight:800}.total-row{padding-top:8px;border-top:1px solid var(--line);font-weight:800}.amount-row{color:var(--green-dark);font-size:1.08rem}.empty{color:var(--muted);line-height:1.45}.primary{width:100%;min-height:50px;border-radius:8px;background:var(--green);color:#fff;font-weight:800;box-shadow:0 12px 22px rgba(47,125,70,.22)}.primary:hover{background:var(--green-dark)}.primary:disabled,.secondary:disabled,.danger:disabled{cursor:not-allowed;background:#9aaa9c;color:#fff;box-shadow:none}.edit-banner{display:none;margin:10px 0 0;padding:10px 12px;border-radius:8px;background:#edf7e9;color:var(--green-dark);font-weight:800}.edit-banner.show{display:block}.form-actions{display:grid;grid-template-columns:1fr;gap:8px}.admin-grid{display:grid;grid-template-columns:330px minmax(0,1fr);gap:14px;align-items:start}.totals,.orders{display:grid;gap:10px}.total-card{padding:11px 12px;border-radius:8px;background:var(--soft);border:1px solid var(--line);font-weight:800}.sales-card{background:#edf7e9;color:var(--green-dark)}.order{border:1px solid var(--line);border-radius:8px;padding:13px;background:#fff}.order-head{display:flex;align-items:start;justify-content:space-between;gap:12px;margin-bottom:8px}.customer{font-weight:900;font-size:1.02rem}.time{color:var(--muted);font-size:.86rem;white-space:nowrap}.order-amount{margin:8px 0 0;font-weight:900;color:var(--green-dark)}.items{margin:0;padding:0;list-style:none;display:flex;flex-wrap:wrap;gap:7px}.items li{padding:6px 9px;border-radius:999px;background:#eef4e9;font-weight:800;font-size:.9rem}.memo{margin:9px 0 0;color:var(--muted);line-height:1.45}.actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}.chooser{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}.choice{display:block;border:1px solid var(--line);border-radius:8px;background:#fff;box-shadow:var(--shadow);padding:18px;text-decoration:none;color:var(--ink)}.choice strong{display:block;font-size:1.2rem;margin-bottom:8px}.choice span{color:var(--muted);line-height:1.5}.hidden{display:none}@media(max-width:860px){.layout,.admin-grid,.chooser{grid-template-columns:1fr}.side{position:static}}@media(max-width:680px){.topbar{align-items:stretch;flex-direction:column}.products{grid-template-columns:1fr}.product{grid-template-columns:76px minmax(0,1fr);min-height:142px}.fruit-art{width:76px}.link-button{width:100%}.field-row,.pin-row{grid-template-columns:1fr}}
.mode-switch{display:grid;grid-template-columns:1fr 1fr;gap:6px;padding:5px;border:1px solid var(--line);border-radius:999px;background:#f8faf5;margin:0 0 14px}.mode-button{min-height:42px;border-radius:999px;background:transparent;color:var(--muted);font-weight:900}.mode-button.active{background:var(--ink);color:#fff}.lookup-actions{display:grid;grid-template-columns:1fr;gap:8px;margin-top:12px}.mode-note{margin:0 0 12px;color:var(--muted);font-size:.92rem;line-height:1.45}.locked-products{opacity:.58}.locked-products .stepper button{cursor:not-allowed}.mode-hidden{display:none!important}.result-view{display:grid;gap:12px}.result-message{margin:0;padding:13px 14px;border-radius:8px;background:#e8f3df;border:1px solid #cfe4bd;color:#2f5f26;font-weight:900}.result-order{display:grid;gap:8px;padding:12px;background:var(--soft);border:1px solid var(--line);border-radius:8px}.result-meta{display:flex;justify-content:space-between;gap:10px;color:var(--muted);font-size:.9rem}.result-items{margin:0;padding:0;list-style:none;display:grid;gap:7px}.result-items li{display:flex;justify-content:space-between;gap:10px;padding:8px 10px;border-radius:8px;background:#fff;border:1px solid var(--line);font-weight:800}.home-layout .products{display:none}.home-layout{grid-template-columns:minmax(0,560px);justify-content:center}.home-layout .side{position:static}</style></head>

const defaultProducts=[{id:"mango",name:"망고",unit:"kg",price:120,artBg:"#fff2bf",artMain:"#f1bd35",rotate:"-8deg",options:[{id:"kg",unit:"kg",price:120}]},{id:"mangosteen",name:"망고스틴",unit:"kg",price:150,artBg:"#efe3f6",artMain:"#7b4b9a",rotate:"10deg",options:[{id:"kg",unit:"kg",price:150}]},{id:"durian",name:"두리안",unit:"개",price:250,artBg:"#eff5d5",artMain:"#9eb94f",rotate:"-2deg",options:[{id:"piece",unit:"개",price:250}]},{id:"rambutan",name:"람부탄",unit:"kg",price:100,artBg:"#ffe4df",artMain:"#d85f50",rotate:"6deg",options:[{id:"kg",unit:"kg",price:100}]},{id:"longan",name:"롱안",unit:"kg",price:90,artBg:"#f5ead5",artMain:"#c99a5b",rotate:"-12deg",options:[{id:"kg",unit:"kg",price:90}]},{id:"dragonfruit",name:"용과",unit:"개",price:70,artBg:"#ffe2ee",artMain:"#e74e8a",rotate:"14deg",options:[{id:"piece",unit:"개",price:70}]}];
const storageKey="fruitOrders";
const settingsKey="fruitOrderSettings";
const productKey="fruitProducts";
function loadOrders(){return JSON.parse(localStorage.getItem(storageKey)||"[]")}
function saveOrders(orders){localStorage.setItem(storageKey,JSON.stringify(orders))}
function loadSettings(){return Object.assign({closed:false,closedAt:null},JSON.parse(localStorage.getItem(settingsKey)||"{}"))}
function isClosed(){return !!loadSettings().closed}
function normalizeProduct(product){const optionSource=Array.isArray(product.options)&&product.options.length?product.options:[{id:"base",unit:String(product.unit||"옵션").replace(/^1/,""),price:Number(product.price||0)}];const options=optionSource.map((option,index)=>({id:String(option.id||option.unit||"option"+index),unit:option.unit||"옵션",price:Number(option.price||0)}));return Object.assign({},product,{hidden:!!product.hidden,imageUrl:product.imageUrl||"",description:product.description||"",unit:options[0].unit,price:options[0].price,options})}
function loadProducts(){const saved=JSON.parse(localStorage.getItem(productKey)||"null");return (Array.isArray(saved)&&saved.length?saved:defaultProducts).map(normalizeProduct).filter((product)=>!product.hidden)}
let products=loadProducts();
function unitCount(product,quantity){return String(product.unit||"옵션")+" X "+quantity}
function priceText(value){return Number(value||0).toLocaleString("en-US")+" THB"}
function itemPrice(item){return Number(item.price??products.find((product)=>product.id===item.id)?.price??0)}
function itemAmount(item){return itemPrice(item)*Number(item.quantity||0)}
function orderAmount(order){return order.items.reduce((sum,item)=>sum+itemAmount(item),0)}
function escapeHtml(value){return String(value).replace(/[&<>"']/g,(char)=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#039;"}[char]))}
function formatDate(value){return new Intl.DateTimeFormat("ko-KR",{month:"2-digit",day:"2-digit",hour:"2-digit",minute:"2-digit"}).format(new Date(value))}
const state={mode:"new",quantities:Object.fromEntries(products.map((product)=>[product.id,0])),selectedOptions:Object.fromEntries(products.map((product)=>[product.id,product.options[0]?.id||"base"])),editingOrderId:null};

function selectedItems(){return products.map((product)=>{const option=product.options.find((item)=>item.id===state.selectedOptions[product.id])||product.options[0];return Object.assign({},product,{unit:option.unit,price:option.price,optionId:option.id,quantity:state.quantities[product.id]})}).filter((product)=>product.quantity>0)}
function renderOrderOnly(order){const totalCount=order.items.reduce((sum,item)=>sum+Number(item.quantity||0),0);resultOrder.innerHTML='<div class="result-meta"><strong>'+escapeHtml(order.customer)+'</strong><span>'+formatDate(order.updatedAt||order.createdAt)+'</span></div><ul class="result-items">'+order.items.map((item)=>'<li><span>'+item.name+' '+unitCount(item,item.quantity)+'<small class="line-note">'+priceText(itemPrice(item))+'</small></span><strong>'+priceText(itemAmount(item))+'</strong></li>').join("")+'</ul><div class="total-row"><span>총 선택</span><span>'+totalCount+'</span></div><div class="total-row amount-row"><span>주문 금액</span><span>'+priceText(orderAmount(order))+'</span></div>'+(order.memo?'<p class="memo">'+escapeHtml(order.memo)+'</p>':'')}
function showCompletion(order,message){resultMessage.textContent=message;renderOrderOnly(order);productsEl.classList.add("mode-hidden");summaryEl.classList.add("mode-hidden");orderForm.classList.add("mode-hidden");modeSwitch.classList.add("mode-hidden");modeNote.classList.add("mode-hidden");editBanner.classList.remove("show");resultView.classList.remove("mode-hidden");mainLayout.classList.add("home-layout");formTitle.textContent="내 주문 내역";orderStatus.textContent="";orderStatus.classList.add("mode-hidden");noticeEl.classList.remove("show")}
function showDeletion(message){resultMessage.textContent=message;resultOrder.innerHTML='<p class="empty">삭제된 주문은 더 이상 표시되지 않습니다.</p>';productsEl.classList.add("mode-hidden");summaryEl.classList.add("mode-hidden");orderForm.classList.add("mode-hidden");modeSwitch.classList.add("mode-hidden");modeNote.classList.add("mode-hidden");editBanner.classList.remove("show");resultView.classList.remove("mode-hidden");mainLayout.classList.add("home-layout");formTitle.textContent="주문 삭제";orderStatus.textContent="";orderStatus.classList.add("mode-hidden");noticeEl.classList.remove("show")}
function hideCompletion(){productsEl.classList.remove("mode-hidden");summaryEl.classList.remove("mode-hidden");orderForm.classList.remove("mode-hidden");modeSwitch.classList.remove("mode-hidden");modeNote.classList.remove("mode-hidden");resultView.classList.add("mode-hidden");mainLayout.classList.remove("home-layout");orderStatus.classList.remove("mode-hidden")}
function validPin(){return /^\d{4}$/.test(customerPin.value.trim())}
function currentIdentity(){return{customer:customerName.value.trim(),pin:customerPin.value.trim()}}
function findOwnOrder(){const identity=currentIdentity();if(!identity.customer||!/^\d{4}$/.test(identity.pin))return null;return loadOrders().slice().reverse().find((order)=>order.customer===identity.customer&&order.pin===identity.pin)||null}
function canChangeProducts(){return !isClosed()&&(state.mode==="new"||!!state.editingOrderId)}
function renderStatus(){const settings=loadSettings();orderStatus.textContent=settings.closed?"주문이 마감되었습니다. 현재는 주문 확인만 가능합니다.":"주문 접수 중입니다. 마감 전까지 기존 주문을 수정하거나 삭제할 수 있습니다.";orderStatus.classList.toggle("closed",settings.closed);deleteOrderButton.disabled=isClosed()||!state.editingOrderId;submitButton.disabled=isClosed()||selectedItems().length===0||state.mode==="edit"&&!state.editingOrderId}
function renderMode(){newModeButton.classList.toggle("active",state.mode==="new");editModeButton.classList.toggle("active",state.mode==="edit");lookupActions.classList.toggle("mode-hidden",state.mode!=="edit");loadOrderButton.classList.toggle("mode-hidden",state.mode==="edit"&&!!state.editingOrderId);deleteOrderButton.classList.toggle("mode-hidden",!(state.mode==="edit"&&!!state.editingOrderId));productsEl.classList.toggle("locked-products",!canChangeProducts());if(state.mode==="new"){formTitle.textContent="신규 주문";modeNote.textContent="처음 주문하는 경우 수량을 고르고 이름/아이디와 4자리 비밀번호를 입력해주세요.";submitButton.textContent="신규 주문하기";editBanner.classList.remove("show")}else{formTitle.textContent="기존 주문 수정";modeNote.textContent=state.editingOrderId?"불러온 주문의 수량과 메모를 수정할 수 있습니다.":"이름/아이디와 4자리 비밀번호를 입력한 뒤 내 주문을 불러오세요.";submitButton.textContent=isClosed()?"주문 마감됨":"주문 수정하기"}}
function renderProducts(){const disabled=!canChangeProducts();productsEl.innerHTML=products.map((product)=>{const option=product.options.find((item)=>item.id===state.selectedOptions[product.id])||product.options[0];const optionSelect=product.options.length>1?'<select class="option-select" data-option-id="'+product.id+'" '+(disabled?'disabled':'')+'>'+product.options.map((item)=>'<option value="'+escapeHtml(item.id)+'" '+(item.id===option.id?'selected':'')+'>'+escapeHtml(item.unit)+' · '+priceText(item.price)+'</option>').join("")+'</select>':'<p>'+escapeHtml(option.unit)+' · '+priceText(option.price)+'</p>';const media=product.imageUrl?'<button class="photo-button" type="button" data-desc-id="'+product.id+'" aria-label="'+escapeHtml(product.name)+' 설명 보기"><img class="product-photo" src="'+escapeHtml(product.imageUrl)+'" alt="'+escapeHtml(product.name)+'"><span class="photo-error">사진 로드 실패</span></button>':'<div class="fruit-art" style="--art-bg:'+product.artBg+'; --art-main:'+product.artMain+'; --art-rotate:'+product.rotate+';" aria-hidden="true"></div>';return '<article class="product">'+media+'<div><h2>'+escapeHtml(product.name)+'</h2>'+(product.description?'<p class="product-desc" id="desc-'+product.id+'">'+escapeHtml(product.description)+'</p>':'')+optionSelect+'<div class="stepper"><button type="button" aria-label="'+escapeHtml(product.name)+' 줄이기" data-action="decrease" data-id="'+product.id+'" '+(disabled?'disabled':'')+'>-</button><output id="qty-'+product.id+'">'+state.quantities[product.id]+'</output><button type="button" aria-label="'+escapeHtml(product.name)+' 늘리기" data-action="increase" data-id="'+product.id+'" '+(disabled?'disabled':'')+'>+</button></div></div></article>'}).join("");renderMode()}
function renderSummary(){const items=selectedItems();if(items.length===0){summaryEl.innerHTML='<span class="empty">'+(state.mode==="edit"&&!state.editingOrderId?'기존 주문을 불러오면 주문 내역이 여기에 표시됩니다.':'아직 선택한 과일이 없습니다.')+'</span>';renderMode();renderStatus();return}const rows=items.map((item)=>'<div class="summary-row"><span>'+item.name+'<small class="line-note">'+unitCount(item,item.quantity)+' · '+priceText(item.price)+'</small></span><strong>'+priceText(itemAmount(item))+'</strong></div>').join("");const totalCount=items.reduce((sum,item)=>sum+item.quantity,0);const totalAmount=items.reduce((sum,item)=>sum+itemAmount(item),0);summaryEl.innerHTML=rows+'<div class="total-row"><span>총 선택</span><span>'+totalCount+'</span></div><div class="total-row amount-row"><span>주문 금액</span><span>'+priceText(totalAmount)+'</span></div>';renderMode();renderStatus()}
function resetQuantities(){products.forEach((product)=>{state.quantities[product.id]=0;state.selectedOptions[product.id]=product.options[0]?.id||"base"})}
function clearLoadedOrder(){state.editingOrderId=null;deleteOrderButton.disabled=true;editBanner.classList.remove("show")}
function resetOrderForm(keepIdentity=false){hideCompletion();resetQuantities();if(!keepIdentity){customerName.value="";customerPin.value=""}memo.value="";clearLoadedOrder();renderProducts();renderSummary()}
function showNotice(message){noticeEl.textContent=message;noticeEl.classList.add("show");window.setTimeout(()=>noticeEl.classList.remove("show"),3200)}
function setMode(mode){hideCompletion();state.mode=mode;resetQuantities();memo.value="";clearLoadedOrder();renderProducts();renderSummary()}
function loadOwnOrder(){if(state.mode!=="edit")setMode("edit");const identity=currentIdentity();if(!identity.customer){showNotice("이름 또는 아이디를 입력해주세요.");return}if(!validPin()){showNotice("비밀번호 4자리를 숫자로 입력해주세요.");return}const order=findOwnOrder();if(!order){resetQuantities();memo.value="";clearLoadedOrder();renderProducts();renderSummary();showNotice("찾을 수 있는 주문이 없습니다. 신규 주문으로 작성해주세요.");return}resetQuantities();order.items.forEach((item)=>{if(state.quantities[item.id]!==undefined){const product=products.find((product)=>product.id===item.id);state.quantities[item.id]=Number(item.quantity||0);state.selectedOptions[item.id]=item.optionId||product?.options.find((option)=>option.unit===item.unit)?.id||state.selectedOptions[item.id]}});memo.value=order.memo||"";state.editingOrderId=order.id;deleteOrderButton.disabled=isClosed();editBanner.classList.add("show");renderProducts();renderSummary();showNotice("내 주문을 불러왔습니다.")}
productsEl.addEventListener("error",(event)=>{const img=event.target.closest(".product-photo");if(!img)return;img.style.display="none";const error=img.parentElement.querySelector(".photo-error");if(error)error.classList.add("show")},true);productsEl.addEventListener("change",(event)=>{const select=event.target.closest("select[data-option-id]");if(!select||!canChangeProducts())return;state.selectedOptions[select.dataset.optionId]=select.value;renderSummary()});productsEl.addEventListener("click",(event)=>{const photo=event.target.closest("[data-desc-id]");if(photo){const desc=document.querySelector("#desc-"+photo.dataset.descId);if(desc)desc.classList.toggle("show");return}if(!canChangeProducts())return;const button=event.target.closest("button[data-action]");if(!button)return;const id=button.dataset.id;const change=button.dataset.action==="increase"?1:-1;state.quantities[id]=Math.max(0,state.quantities[id]+change);document.querySelector("#qty-"+id).textContent=state.quantities[id];renderSummary()});
newModeButton.addEventListener("click",()=>setMode("new"));editModeButton.addEventListener("click",()=>setMode("edit"));loadOrderButton.addEventListener("click",loadOwnOrder);customerPin.addEventListener("input",()=>{customerPin.value=customerPin.value.replace(/\D/g,"").slice(0,4)});customerName.addEventListener("input",()=>{if(state.mode==="edit"){clearLoadedOrder();resetQuantities();memo.value="";renderProducts();renderSummary()}});customerPin.addEventListener("change",()=>{if(state.mode==="edit"){clearLoadedOrder();resetQuantities();memo.value="";renderProducts();renderSummary()}});
orderForm.addEventListener("submit",(event)=>{event.preventDefault();if(isClosed()){showNotice("주문이 마감되어 수정할 수 없습니다.");return}const identity=currentIdentity();const items=selectedItems();if(!identity.customer){showNotice("이름 또는 아이디를 입력해주세요.");return}if(!validPin()){showNotice("비밀번호 4자리를 숫자로 입력해주세요.");return}if(items.length===0){showNotice("과일을 하나 이상 선택해주세요.");return}const orders=loadOrders();const existingIndex=orders.findIndex((order)=>order.customer===identity.customer&&order.pin===identity.pin);if(state.mode==="new"&&existingIndex>=0){showNotice("이미 같은 이름/비밀번호의 주문이 있습니다. 기존 주문 수정에서 불러와 주세요.");return}if(state.mode==="edit"&&existingIndex<0){showNotice("먼저 내 주문을 불러와 주세요.");return}const targetIndex=state.mode==="edit"?existingIndex:-1;const orderData={id:targetIndex>=0?orders[targetIndex].id:crypto.randomUUID(),customer:identity.customer,pin:identity.pin,memo:memo.value.trim(),createdAt:targetIndex>=0?orders[targetIndex].createdAt:new Date().toISOString(),updatedAt:new Date().toISOString(),items:items.map((item)=>({id:item.id,name:item.name,unit:item.unit,optionId:item.optionId,price:item.price,quantity:item.quantity}))};if(targetIndex>=0){orders[targetIndex]=orderData;showNotice("주문이 수정되었습니다.")}else{orders.push(orderData);showNotice("주문이 접수되었습니다.")}saveOrders(orders);state.mode="edit";state.editingOrderId=orderData.id;showCompletion(orderData,targetIndex>=0?"주문 수정이 완료되었습니다.":"신규 주문이 완료되었습니다.")});
deleteOrderButton.addEventListener("click",()=>{if(isClosed()){showNotice("주문이 마감되어 삭제할 수 없습니다.");return}const identity=currentIdentity();if(!identity.customer||!validPin()){showNotice("이름/아이디와 비밀번호 4자리를 입력해주세요.");return}const order=findOwnOrder();if(!order){showNotice("삭제할 주문을 찾을 수 없습니다.");return}if(!confirm("내 주문을 삭제할까요?"))return;saveOrders(loadOrders().filter((item)=>item.id!==order.id));resetQuantities();memo.value="";clearLoadedOrder();state.mode="new";showDeletion("주문 삭제가 완료되었습니다.")});
homeButton.addEventListener("click",()=>{state.mode="new";resetOrderForm(false);renderProducts();renderSummary()});window.addEventListener("storage",(event)=>{if(event.key===settingsKey||event.key===productKey){products=loadProducts();state.quantities=Object.fromEntries(products.map((product)=>[product.id,state.quantities[product.id]||0]));state.selectedOptions=Object.fromEntries(products.map((product)=>[product.id,state.selectedOptions[product.id]||product.options[0]?.id||"base"]));renderProducts();renderSummary()}});renderProducts();renderSummary();</script></body></html>
